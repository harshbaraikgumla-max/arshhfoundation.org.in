<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
    color:#333;
}

/* HEADER */

header{
    background:#2c3e50;
    padding:20px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    color:white;
    font-size:30px;
    font-weight:bold;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:20px;
    font-size:18px;
}

nav a:hover{
    color:#e74c3c;
}

/* HERO */

.hero{
    height:400px;
    background:url('contact.jpg') center center/cover no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
}

.hero-content{
    background:rgba(0,0,0,0.5);
    padding:30px;
    border-radius:10px;
}

.hero h1{
    font-size:60px;
    margin-bottom:15px;
}

.hero p{
    font-size:22px;
}

/* CONTACT SECTION */

.container{
    width:90%;
    max-width:1200px;
    margin:auto;
    padding:70px 0;
}

.contact-box{
    background:white;
    padding:40px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.contact-box h2{
    text-align:center;
    color:#2c3e50;
    margin-bottom:40px;
    font-size:40px;
}

/* CONTACT INFO */

.info{
    margin-bottom:40px;
}

.info-item{
    background:#f9f9f9;
    padding:18px;
    margin-bottom:15px;
    border-left:5px solid #e74c3c;
    font-size:18px;
}

/* FORM */

form{
    margin-top:30px;
}

.input-group{
    margin-bottom:20px;
}

input,
textarea{
    width:100%;
    padding:15px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:16px;
}

textarea{
    height:150px;
    resize:none;
}

button{
    background:#e74c3c;
    color:white;
    border:none;
    padding:15px 30px;
    font-size:18px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#c0392b;
}

/* MAP SPACE */

.map-box{
    width:100%;
    height:300px;
    margin-top:40px;
    border:3px dashed #ccc;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#fafafa;
    color:#777;
    font-size:28px;
}

/* FOOTER */

footer{
    background:#111;
    color:white;
    text-align:center;
    padding:25px;
    margin-top:50px;
}

/* MOBILE */

@media(max-width:768px){

header{
    flex-direction:column;
}

nav{
    margin-top:15px;
}

.hero h1{
    font-size:40px;
}

.hero p{
    font-size:18px;
}

}

</style>

</head>

<body>

<!-- HEADER -->

<header>

<div class="logo">Charity NGO</div>

<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="donation.html">Donation</a>
<a href="contact.html">Contact</a>
</nav>

</header>

<!-- HERO -->

<div class="hero">

<div class="hero-content">

<h1>Contact Us</h1>

<p>
We Would Love To Hear From You
</p>

</div>

</div>

<!-- CONTACT SECTION -->

<div class="container">

<div class="contact-box">

<h2>Get In Touch</h2>

<!-- CONTACT INFO -->

<div class="info">

<div class="info-item">
<b>Address :</b> ___________________________
</div>

<div class="info-item">
<b>Phone :</b> ___________________________
</div>

<div class="info-item">
<b>Email :</b> ___________________________
</div>

</div>

<!-- CONTACT FORM -->

<form>

<div class="input-group">
<input type="text" placeholder="Your Name">
</div>

<div class="input-group">
<input type="email" placeholder="Your Email">
</div>

<div class="input-group">
<input type="text" placeholder="Subject">
</div>

<div class="input-group">
<textarea placeholder="Your Message"></textarea>
</div>

<button type="submit">Send Message</button>

</form>

<!-- MAP SPACE -->

<div class="map-box">

ADD GOOGLE MAP HERE

</div>

</div>

</div>

<!-- FOOTER -->

<footer>

<p>
© 2026 Charity NGO | All Rights Reserved
</p>

</footer>

</body>
</html>
```
